name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Run Python tests
        env:
          VANTAGE_DATA_DIR: ${{ runner.temp }}\Vantage\data
          VANTAGE_CONFIG_DIR: ${{ runner.temp }}\Vantage\config
          VANTAGE_HISTORY_DIR: ${{ runner.temp }}\Vantage\history
          VANTAGE_LOG_DIR: ${{ runner.temp }}\Vantage\logs
          VANTAGE_PLOT_DIR: ${{ runner.temp }}\Vantage\plot_outputs
          VANTAGE_CACHE_DIR: ${{ runner.temp }}\Vantage\cache
          VANTAGE_RUNTIME_DIR: ${{ runner.temp }}\Vantage\runtime
          VANTAGE_MIGRATION_DIR: ${{ runner.temp }}\Vantage\migration
        run: python -m pytest -q

  frontend:
    name: Frontend tests and build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: src/webapp/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/webapp
      - name: Run frontend tests
        run: npm test
        working-directory: src/webapp
      - name: Build frontend
        run: npm run build
        working-directory: src/webapp
